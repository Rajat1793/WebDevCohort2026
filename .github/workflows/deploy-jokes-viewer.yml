name: Deploy Jokes Viewer

on:
  push:
    branches: [main]
    paths:
      - 'projects/jokes_viewer/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/jokes_viewer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: projects/jokes_viewer/dist
          destination_dir: projects/jokes_viewer
