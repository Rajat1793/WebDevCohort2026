<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Million Checkbox</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Color pick modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-card">
      <div class="modal-title">Pick your color</div>
      <p class="modal-sub">This is yours for this session. Choose once, then start painting.</p>
      <div class="modal-swatches" id="modal-swatches"></div>
      <div class="modal-custom-row">
        <label for="modal-color-input">any color</label>
        <input type="color" id="modal-color-input" value="#4FBDBA" />
      </div>
      <div class="modal-preview">
        <div class="modal-preview-chip" id="preview-chip"></div>
        <span class="modal-preview-label" id="preview-label">nothing selected yet</span>
      </div>
      <button class="modal-confirm-btn" id="confirm-btn" disabled>Start painting</button>
    </div>
  </div>

  <!-- Main UI -->
  <nav>
    <div class="logo">
      <div class="logo-icon"><span></span><span></span><span></span><span></span></div>
      <span class="logo-text">MILLION CHECKBOX</span>
    </div>
    <div class="nav-center">
      <span id="lit-count">0</span> / 800 lit
    </div>
    <div class="nav-right">
      <div class="color-badge" id="color-badge"></div>
      <button class="clear-btn" id="clear-btn">Clear Grid</button>
      <div class="status-pill connecting" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-text">connecting…</span>
      </div>
    </div>
  </nav>

  <div class="grid-wrapper locked" id="grid-wrapper">
    <div id="grid"></div>
  </div>

  <p class="hint">click a box · <span>your color stays</span> · open two tabs to sync</p>

  <script>
    const TOTAL = 800;
    const PRESETS = [
      "#FF8080","#FFBA92","#E0F5B9","#C6F1D6",
      "#AA77FF","#C9EEFF","#97DEFF","#62CDFF",
      "#072227","#35858B","#4FBDBA","#AEFEFF"
    ];

    // ── Build grid (single DOM insertion via DocumentFragment) ───────
    const gridEl = document.getElementById("grid");
    const boxes  = [];
    const frag   = document.createDocumentFragment();
    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement("div");
      d.className = "box";
      d.dataset.id = i;
      frag.appendChild(d);
      boxes.push(d);
    }
    gridEl.appendChild(frag);

    // ── Elements ────────────────────────────────────────────────────
    const modal       = document.getElementById("modal");
    const swatchWrap  = document.getElementById("modal-swatches");
    const colorInput  = document.getElementById("modal-color-input");
    const previewChip = document.getElementById("preview-chip");
    const previewLbl  = document.getElementById("preview-label");
    const confirmBtn  = document.getElementById("confirm-btn");
    const badge       = document.getElementById("color-badge");
    const clearBtn    = document.getElementById("clear-btn");
    const gridWrapper = document.getElementById("grid-wrapper");
    const pill        = document.getElementById("status-pill");
    const statusText  = document.getElementById("status-text");
    const litCountEl  = document.getElementById("lit-count");

    // ── App state ───────────────────────────────────────────────────
    let myColor   = null;
    let chosen    = null;
    let litCount  = 0;
    let activeSwatch = -1;  // index of currently active preset swatch

    function previewColor(hex, swatchIdx = -1) {
      chosen = hex;
      previewChip.style.background = hex;
      previewChip.style.boxShadow  = "0 0 0 3px rgba(255,248,236,0.7), 0 0 10px " + hex;
      previewLbl.textContent = hex.toUpperCase();
      confirmBtn.disabled = false;
      confirmBtn.classList.add("ready");
      confirmBtn.style.background = hex;
      confirmBtn.style.color = isLight(hex) ? "#3b3020" : "#fff";
      document.documentElement.style.setProperty("--my-color", hex);
      // highlight swatch — only touch the two affected elements
      if (activeSwatch >= 0) swatches[activeSwatch].classList.remove("active");
      activeSwatch = swatchIdx;
      if (swatchIdx >= 0) swatches[swatchIdx].classList.add("active");
    }

    function isLight(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return (r*299 + g*587 + b*114)/1000 > 140;
    }

    // Build swatches (single fragment insert)
    const swatches = [];
    const sf = document.createDocumentFragment();
    PRESETS.forEach((hex, i) => {
      const s = document.createElement("div");
      s.className = "modal-swatch";
      s.style.background = hex;
      s.title = hex;
      s.addEventListener("click", () => previewColor(hex, i));
      sf.appendChild(s);
      swatches.push(s);
    });
    swatchWrap.appendChild(sf);

    colorInput.addEventListener("input",  () => previewColor(colorInput.value));
    colorInput.addEventListener("change", () => previewColor(colorInput.value));

    confirmBtn.addEventListener("click", () => {
      if (!chosen || confirmBtn.disabled) return;
      myColor = chosen;
      badge.style.background = myColor;
      badge.style.boxShadow  = "0 0 0 3px rgba(255,248,236,0.7), 0 0 10px " + myColor;
      // --my-color already set by previewColor; hide modal, unlock grid
      modal.classList.add("hidden");
      gridWrapper.classList.remove("locked");
    });

    // ── Helpers ─────────────────────────────────────────────────────
    function setStatus(s) {
      const labels = { connected:"live", disconnected:"offline", connecting:"connecting…" };
      statusText.textContent = labels[s] || s;
      pill.className = "status-pill " + s;
    }

    function paintBox(id, color, pop) {
      const box = boxes[id];
      if (!box) return;
      const wasLit = box.classList.contains("lit");
      if (color) {
        box.style.background = color;
        box.style.boxShadow  = "0 0 5px 1px " + color + "88";
        box.classList.add("lit");
        if (!wasLit) litCount++;
      } else {
        box.style.background = "";
        box.style.boxShadow  = "";
        box.classList.remove("lit");
        if (wasLit) litCount--;
      }
      litCountEl.textContent = litCount;
      // Web Animations API: no forced reflow (replaces void offsetWidth trick)
      if (pop) {
        box.animate(
          [{ transform:"scale(1)" }, { transform:"scale(1.35)" }, { transform:"scale(1)" }],
          { duration: 180, easing: "ease" }
        );
      }
    }

    // ── WebSocket ────────────────────────────────────────────────────
    let ws = null;
    let delay = 500;

    function connect() {
      setStatus("connecting");
      const proto = location.protocol === "https:" ? "wss" : "ws";
      ws = new WebSocket(proto + "://" + location.host);

      ws.onopen = () => { setStatus("connected"); delay = 500; };

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === "init") {
          litCount = 0;
          // Only paint lit boxes; skip null entries entirely
          msg.state.forEach((color, id) => { if (color) paintBox(id, color, false); });
        }
        if (msg.type === "update") {
          paintBox(msg.id, msg.color, true);
        }
        if (msg.type === "cleared") {
          litCount = 0;
          litCountEl.textContent = 0;
          boxes.forEach(b => {
            b.style.background = "";
            b.style.boxShadow  = "";
            b.classList.remove("lit");
          });
        }
      };

      ws.onclose = () => {
        setStatus("disconnected");
        setTimeout(() => { delay = Math.min(delay * 1.5, 5000); connect(); }, delay);
      };

      ws.onerror = () => ws.close();
    }

    // ── Grid click handler ───────────────────────────────────────────
    gridEl.addEventListener("click", e => {
      const box = e.target.closest(".box");
      if (!box || !myColor || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: "toggle", id: Number(box.dataset.id), color: myColor }));
    });

    // ── Clear grid ───────────────────────────────────────────────────
    clearBtn.addEventListener("click", () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      if (!confirm("Clear the entire grid for everyone?")) return;
      ws.send(JSON.stringify({ type: "clearGrid" }));
    });

    connect();
  </script>
</body>
</html>
