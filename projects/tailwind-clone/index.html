<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChaiTailwind | Live Playground</title>
    <style>
        body { font-family: sans-serif; background-color: #dad7cd; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #f0f0f0; padding: 30px; border-radius: 15px;}
        input { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        .preview-label { font-weight: bold; color: #555; margin-bottom: 10px; display: block; }
        #previewBox { min-height: 100px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>

    <div class="container">
        <h1>FlexWind </h1>
        <p>A reactive, utility-first CSS-in-JS library for the 2026 Web Dev Cohort.</p>

        <hr>

        <label class="preview-label">Try it live:</label>
        <input type="text" id="chaiInput" placeholder="Try: chai-bg-primary chai-p-40 chai-rounded-20 chai-text-white">
        
        <div id="previewBox" class="chai-bg-dark chai-text-white chai-p-20">
            Preview Box
        </div>

        <hr>

        <h3>Example Syntax to Copy:</h3>
        <ul>
            <li><code>chai-bg-danger chai-p-20 chai-rounded-10</code></li>
            <li><code>chai-bg-secondary chai-w-200 chai-h-100</code></li>
            <li><code>chai-bg-primary chai-hover-bg-dark chai-p-15</code></li>
        </ul>

        <a href="./advance.html"><button class="chai-bg-danger chai-text-white chai-rounded-5 chai-p-10-20 chai-bw-0 chai-hover-bg-dark" alt="AI Content">Don't click</button></a>
    </div>

    <script src="script.js"></script>

    <script>
        const input = document.getElementById('chaiInput');
        const box = document.getElementById('previewBox');

        input.addEventListener('input', (e) => {
            box.className = e.target.value;
        });
    </script>
</body>
</html>
